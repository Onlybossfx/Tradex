<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradex — Listing</title>
  <meta name="description"        content="Find the best products, services and skills on Tradex marketplace." />
  <meta name="robots"             content="index, follow" />
  <meta property="og:type"        content="product" />
  <meta property="og:site_name"   content="Tradex" />
  <meta property="og:url"         id="og-url"   content="https://tradex.market/listing.html" />
  <meta property="og:title"       id="og-title" content="Tradex Listing" />
  <meta property="og:description" id="og-desc"  content="Find the best products and services on Tradex." />
  <meta property="og:image"       id="og-img"   content="https://tradex.market/og-image.png" />
  <meta property="og:price:amount"       id="og-price"    content="" />
  <meta property="og:price:currency"     content="USD" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      id="tw-title" content="Tradex Listing" />
  <meta name="twitter:description" id="tw-desc" content="Find the best products and services on Tradex." />
  <meta name="twitter:image"      id="tw-img"   content="https://tradex.market/og-image.png" />
  <link rel="canonical"           id="canonical" href="https://tradex.market/listing.html" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F59E0B" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.guard.js"></script>
  <script src="auth.backend.js"></script>
  <script src="listings.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #F59E0B; --amber-light: #FBBF24; --amber-dim: rgba(245,158,11,0.1);
      --bg: #0a0a0a; --bg2: #0f0f0f; --bg3: #141414; --bg4: #181818;
      --border: rgba(255,255,255,0.07); --border-md: rgba(255,255,255,0.11);
      --text: #fff; --muted: rgba(255,255,255,0.45); --dim: rgba(255,255,255,0.22);
      --error: #EF4444; --success: #10B981;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --nav-h: 62px;
    }
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--sans); }

    /* ══ NAV ══ */
    #nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); padding: 0 1.25rem; background: rgba(10,10,10,0.96); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .nav-logo { display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .nav-logo span { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .nav-logo i { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: inline-block; }
    .nav-back { background: transparent; border: none; color: var(--muted); font-size: 1.3rem; padding: 4px; display: flex; align-items: center; cursor: pointer; }
    .nav-right { display: flex; align-items: center; gap: 0.6rem; }
    .btn-sm { background: transparent; border: 1px solid var(--border-md); color: var(--text); padding: 0.38rem 0.85rem; border-radius: 7px; font-size: 0.8rem; white-space: nowrap; transition: all 0.2s; }
    .btn-amber-sm { background: var(--amber); border: none; color: #0a0a0a; padding: 0.38rem 0.85rem; border-radius: 7px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
    .btn-amber-sm:hover { background: var(--amber-light); }

    /* ══ BREADCRUMB ══ */
    .breadcrumb { display: flex; align-items: center; gap: 0.4rem; padding: calc(var(--nav-h) + 0.85rem) 1.25rem 0; font-size: 0.78rem; color: var(--muted); overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
    .breadcrumb::-webkit-scrollbar { display: none; }
    .breadcrumb a { color: var(--muted); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--amber); }
    .breadcrumb .sep { color: var(--dim); }
    .breadcrumb .cur { color: var(--text); }

    /* ══ LAYOUT ══ */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 1rem 1.25rem 120px; }

    /* ══ GALLERY ══ */
    .gallery { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1rem; }
    .gallery-main { height: 280px; position: relative; overflow: hidden; background: var(--bg3); cursor: zoom-in; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
    .gallery-main img:hover { transform: scale(1.04); }
    .gallery-main .img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 6rem; }
    .gallery-nav { display: flex; gap: 0.5rem; padding: 0.6rem; overflow-x: auto; scrollbar-width: none; }
    .gallery-nav::-webkit-scrollbar { display: none; }
    .g-thumb { width: 62px; height: 62px; border-radius: 8px; border: 2px solid transparent; overflow: hidden; cursor: pointer; transition: all 0.2s; flex-shrink: 0; background: var(--bg3); }
    .g-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .g-thumb.active { border-color: var(--amber); }
    .g-thumb:hover { border-color: var(--border-md); }

    /* ══ META ══ */
    .listing-meta { margin-bottom: 1rem; }
    .meta-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .cat-pill { background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2); color: var(--amber); font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.65rem; border-radius: 100px; }
    .l-badge { font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px; }
    .badge-top  { background: var(--amber); color: #0a0a0a; }
    .badge-best { background: #6366F1; color: #fff; }
    .badge-new  { background: var(--success); color: #fff; }
    .badge-ver  { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border-md); }
    .listing-title { font-family: var(--serif); font-size: clamp(1.3rem,5vw,2rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.85rem; }
    .listing-stats { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.82rem; }
    .stat-icon { font-size: 0.85rem; }
    .stat-val { font-weight: 600; }
    .stat-label { color: var(--muted); }
    .rating-stars { color: var(--amber); font-size: 0.85rem; }

    /* ══ SELLER MINI ══ */
    .seller-mini { display: flex; align-items: center; gap: 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 1rem; }
    .sm-av { width: 40px; height: 40px; border-radius: 50%; background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.25); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: var(--amber); flex-shrink: 0; overflow: hidden; }
    .sm-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .sm-info { flex: 1; min-width: 0; }
    .sm-name { font-size: 0.88rem; font-weight: 600; }
    .sm-tag { font-size: 0.75rem; color: var(--muted); }
    .sm-badge { color: var(--success); font-size: 0.78rem; flex-shrink: 0; }

    /* ══ PACKAGE ══ */
    .pkg-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .pkg-tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.3rem; background: var(--bg3); border-radius: 9px; padding: 3px; margin-bottom: 0.9rem; }
    .pkg-tab { padding: 0.42rem; border: none; background: transparent; color: var(--muted); font-size: 0.78rem; font-weight: 500; font-family: var(--sans); border-radius: 7px; cursor: pointer; transition: all 0.2s; }
    .pkg-tab.active { background: var(--bg2); color: var(--text); border: 1px solid var(--border-md); }
    .pkg-price { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; color: var(--amber); margin-bottom: 0.25rem; }
    .pkg-note { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
    .pkg-feats { display: flex; flex-direction: column; gap: 0.42rem; margin-bottom: 0.85rem; }
    .pkg-feat { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: rgba(255,255,255,0.65); }
    .pf-check { color: var(--success); font-size: 0.78rem; flex-shrink: 0; }
    .pkg-del { display: flex; align-items: center; gap: 0.5rem; background: var(--bg3); border-radius: 8px; padding: 0.55rem 0.8rem; font-size: 0.82rem; }
    .pkg-del strong { color: var(--text); }
    .pkg-del span { color: var(--muted); }

    /* ══ TRUST ══ */
    .trust-row { display: flex; justify-content: space-around; padding: 0.85rem 0; border-top: 1px solid var(--border); margin-bottom: 1rem; }
    .ti { text-align: center; }
    .ti-icon { font-size: 1.1rem; margin-bottom: 0.2rem; }
    .ti-label { font-size: 0.65rem; color: var(--dim); line-height: 1.3; }

    /* ══ TABS ══ */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 0.7rem 1rem; font-size: 0.84rem; font-weight: 500; color: var(--muted); border: none; background: transparent; cursor: pointer; position: relative; transition: color 0.2s; white-space: nowrap; flex-shrink: 0; }
    .tab.active { color: var(--amber); }
    .tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--amber); border-radius:2px 2px 0 0; }
    .tab-panel { display: none; animation: fadeIn 0.2s ease; }
    .tab-panel.active { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    /* description */
    .desc-body { color: rgba(255,255,255,0.7); font-size: 0.9rem; line-height: 1.8; }
    .desc-body p { margin-bottom: 0.85rem; }
    .desc-body ul { padding-left: 1.25rem; margin-bottom: 0.85rem; }
    .desc-body li { margin-bottom: 0.35rem; }
    .desc-body h4 { font-family: var(--serif); font-size: 1rem; color: var(--text); margin: 1rem 0 0.5rem; }

    /* tags */
    .tags-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 1rem; }
    .tag-pill { background: var(--bg3); border: 1px solid var(--border-md); color: var(--muted); font-size: 0.74rem; padding: 0.22rem 0.6rem; border-radius: 100px; cursor: pointer; transition: all 0.2s; }
    .tag-pill:hover { border-color: rgba(245,158,11,0.3); color: var(--amber); }

    /* reviews */
    .rv-summary { display: flex; gap: 1rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; align-items: center; }
    .rv-big { text-align: center; flex-shrink: 0; }
    .rv-val { font-family: var(--serif); font-size: 2.5rem; font-weight: 700; color: var(--amber); line-height: 1; }
    .rv-stars { color: var(--amber); font-size: 0.88rem; margin: 0.25rem 0; }
    .rv-total { color: var(--muted); font-size: 0.74rem; }
    .rv-bars { flex: 1; display: flex; flex-direction: column; gap: 0.38rem; min-width: 0; }
    .rbar { display: flex; align-items: center; gap: 0.45rem; }
    .rbar-lbl { font-size: 0.73rem; color: var(--muted); width: 22px; flex-shrink: 0; }
    .rbar-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .rbar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.6s; }
    .rbar-cnt { font-size: 0.68rem; color: var(--dim); width: 16px; text-align: right; }
    .rv-list { display: flex; flex-direction: column; gap: 0.9rem; }
    .rv-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.95rem; }
    .rv-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.55rem; gap: 0.5rem; }
    .rv-user { display: flex; align-items: center; gap: 0.55rem; }
    .rv-av { width: 30px; height: 30px; border-radius: 50%; background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; color: var(--amber); flex-shrink: 0; }
    .rv-name { font-size: 0.85rem; font-weight: 600; }
    .rv-date { font-size: 0.72rem; color: var(--dim); }
    .rv-rating { color: var(--amber); font-size: 0.8rem; flex-shrink: 0; }
    .rv-text { color: rgba(255,255,255,0.65); font-size: 0.83rem; line-height: 1.65; }
    .no-reviews { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 2rem 0; }

    /* seller tab */
    .seller-full { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .sf-head { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1rem; }
    .sf-av { width: 56px; height: 56px; border-radius: 50%; background: var(--amber-dim); border: 2px solid rgba(245,158,11,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: var(--amber); flex-shrink: 0; }
    .sf-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.15rem; }
    .sf-sub { color: var(--muted); font-size: 0.8rem; }
    .sf-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .sf-stat { text-align: center; background: var(--bg3); border-radius: 10px; padding: 0.6rem 0.4rem; }
    .ss-val { font-family: var(--serif); font-size: 1.05rem; font-weight: 700; color: var(--amber); }
    .ss-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 0.12rem; }
    .sf-bio { color: rgba(255,255,255,0.6); font-size: 0.83rem; line-height: 1.65; margin-bottom: 1rem; }
    .sf-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .sf-pill { background: var(--bg3); border: 1px solid var(--border-md); color: var(--muted); font-size: 0.73rem; padding: 0.2rem 0.55rem; border-radius: 100px; }

    /* related */
    .related { margin-top: 2rem; }
    .related h2 { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; margin-bottom: 0.9rem; }
    .related-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.8rem; }
    .mini-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.25s; text-decoration: none; display: block; }
    .mini-card:hover { border-color: rgba(245,158,11,0.2); transform: translateY(-2px); }
    .mini-img { height: 90px; overflow: hidden; background: var(--bg3); }
    .mini-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
    .mini-card:hover .mini-img img { transform: scale(1.04); }
    .mini-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .mini-body { padding: 0.7rem; }
    .mini-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.28rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
    .mini-foot { display: flex; justify-content: space-between; align-items: center; }
    .mini-rating { font-size: 0.72rem; color: var(--muted); }
    .mini-rating span { color: var(--amber); }
    .mini-price { font-family: var(--serif); font-size: 0.88rem; font-weight: 700; color: var(--amber); }

    /* ══ PINNED BUY BAR (mobile) ══ */
    #buy-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 90; background: rgba(10,10,10,0.97); backdrop-filter: blur(14px); border-top: 1px solid var(--border); padding: 0.8rem 1.25rem; }
    .buy-bar-row { display: flex; align-items: center; gap: 0.65rem; }
    .bar-price { flex-shrink: 0; }
    .bar-from { font-size: 0.68rem; color: var(--muted); }
    .bar-amount { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; color: var(--amber); line-height: 1; }
    .btn-buy { flex: 1; padding: 0.78rem; background: var(--amber); border: none; border-radius: 10px; color: #0a0a0a; font-size: 0.9rem; font-weight: 700; transition: all 0.2s; position: relative; }
    .btn-buy:hover { background: var(--amber-light); }
    .btn-buy.loading .lbl { visibility: hidden; }
    .btn-buy.loading::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:16px; height:16px; border:2px solid rgba(10,10,10,0.3); border-top-color:#0a0a0a; border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:translate(-50%,-50%) rotate(360deg)} }
    .btn-icon { padding: 0.78rem 0.9rem; background: transparent; border: 1px solid var(--border-md); color: var(--muted); border-radius: 10px; font-size: 0.95rem; transition: all 0.2s; flex-shrink: 0; }
    .btn-icon:hover, .btn-icon.saved { border-color: rgba(239,68,68,0.4); color: #F87171; background: rgba(239,68,68,0.06); }

    /* alerts */
    .alert { display: none; padding: 0.65rem 0.85rem; border-radius: 10px; font-size: 0.82rem; margin-bottom: 0.75rem; align-items: center; gap: 0.5rem; }
    .alert.on { display: flex; }
    .alert.err  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #FCA5A5; }
    .alert.ok   { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6EE7B7; }
    .alert.info { background: var(--amber-dim);     border: 1px solid rgba(245,158,11,0.25); color: #FCD34D; }

    /* skeleton */
    .skeleton { background: linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ══ DESKTOP ══ */
    @media (min-width: 900px) {
      .page-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; align-items: start; padding: 1.5rem 1.5rem 4rem; }
      #buy-bar { display: none; }
      .buy-desktop { display: block !important; }
      .gallery-main { height: 380px; }
      .related-grid { grid-template-columns: repeat(4,1fr); }
      .related { margin-top: 0; }
    }
    .buy-desktop { display: none; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; position: sticky; top: calc(var(--nav-h) + 1.25rem); }

    @media (max-width: 400px) {
      .rv-summary { flex-direction: column; }
      .related-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <button class="nav-back" onclick="history.back()">←</button>
  <a href="index.html" class="nav-logo"><span>Tradex</span><i></i></a>
  <div class="nav-right">
    <button class="btn-sm"       id="nav-login"  onclick="window.location.href='tradex-auth.html'" style="display:none">Log In</button>
    <button class="btn-amber-sm" id="nav-signup" onclick="window.location.href='tradex-auth.html#signup'" style="display:none">Sign Up</button>
    <div id="nav-avatar" style="display:none;width:30px;height:30px;border-radius:50%;background:var(--amber-dim);border:1px solid rgba(245,158,11,0.3);align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:var(--amber);cursor:pointer;flex-shrink:0"></div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="index.html">Home</a><span class="sep">›</span>
  <a href="browse.html">Browse</a><span class="sep">›</span>
  <span class="cur" id="bc-cat"></span><span class="sep">›</span>
  <span class="cur" id="bc-title"></span>
</div>

<!-- PAGE -->
<div class="page-wrap">

  <!-- LEFT -->
  <div id="left-col">

    <!-- Gallery -->
    <div class="gallery" id="gallery">
      <div class="gallery-main" id="gallery-main">
        <div class="skeleton" style="width:100%;height:100%;border-radius:0"></div>
      </div>
    </div>

    <!-- Meta -->
    <div class="listing-meta" id="listing-meta">
      <div style="height:20px;width:120px;margin-bottom:0.6rem" class="skeleton"></div>
      <div style="height:32px;width:90%;margin-bottom:0.85rem" class="skeleton"></div>
      <div style="height:14px;width:60%" class="skeleton"></div>
    </div>

    <!-- Seller mini -->
    <div class="seller-mini" id="seller-mini" style="opacity:0"></div>

    <!-- Package box -->
    <div class="pkg-box" id="pkg-box" style="opacity:0">
      <div class="pkg-tabs" id="pkg-tabs">
        <button class="pkg-tab active" data-pkg="0">Basic</button>
        <button class="pkg-tab" data-pkg="1">Standard</button>
        <button class="pkg-tab" data-pkg="2">Premium</button>
      </div>
      <div class="pkg-price" id="pkg-price">—</div>
      <div class="pkg-note" id="pkg-note"></div>

    <div class="trust-row">

      <div class="tags-row" id="l-tags"></div>

    <div class="tab-panel" id="panel-reviews">

        <div class="rv-big"><div class="rv-val" id="rv-val"></div><div class="rv-stars" id="rv-stars"></div><div class="rv-total" id="rv-total"></div></div>
        <div class="rv-bars" id="rv-bars"></div>

  <!-- DESKTOP BUY CARD -->

    <div style="margin-bottom:1.1rem">
      <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.2rem">Starting from</div>
      <div class="pkg-price" id="pkg-price-d">—</div>
      <div style="font-size:0.74rem;color:var(--dim);margin-top:0.25rem" id="pkg-note-d"></div>
    </div>
    <div class="pkg-feats" id="pkg-feats-d" style="margin-bottom:1rem"></div>
    <div class="pkg-del" style="margin-bottom:1.25rem"><span>⚡</span><strong id="pkg-days-d"></strong><span id="pkg-revs-d"></span></div>
    <button class="btn-buy" style="width:100%;margin-bottom:0.6rem" id="buy-btn-d"><span class="lbl">Continue to Payment →</span></button>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.6rem">
      <button class="btn-icon" style="flex:1" id="save-btn-d">🤍 Save</button>
      <button class="btn-icon" id="contact-btn-d">💬</button>
      <button class="btn-icon" id="share-btn-d">🔗</button>

      <div class="ti"><div class="ti-icon">🔒</div><div class="ti-label">Secure<br>Payment</div></div>
      <div class="ti"><div class="ti-icon">🛡️</div><div class="ti-label">Buyer<br>Protection</div></div>
      <div class="ti"><div class="ti-icon">↩️</div><div class="ti-label">Refund<br>Policy</div></div>
      <div class="ti"><div class="ti-icon">💬</div><div class="ti-label">24/7<br>Support</div></div>

<!-- MOBILE BUY BAR -->
<div id="buy-bar">
  <div class="buy-bar-row">
    <div class="bar-price">
      <div class="bar-from">from</div>
      <div class="bar-amount" id="bar-amount">—</div>
    </div>
    <button class="btn-buy" id="buy-btn"><span class="lbl">Continue to Payment →</span></button>
    <button class="btn-icon" id="contact-btn">💬</button>
    <button class="btn-icon" id="save-btn">🤍</button>
  </div>
</div>

<script>
/*
  listing.html — pulls real data from Supabase via listings.js
  Listing ID read from URL: listing.html?id=1
*/

let listing = null;
let selPkgIdx = 0;
let isSaved = false;
const $ = id => document.getElementById(id);

/* ── Default packages (used if listing has no custom packages) ── */
function getPackages(l) {
  return [
    { label:'Basic',    price: l.price,                note: 'Essential package',         feats:['Core deliverables', `${l.delivery_days} day delivery`, '1 revision'], days: l.delivery_days, revisions: 1 },
    { label:'Standard', price: Math.round(l.price*2),  note: 'Most popular option',        feats:['Everything in Basic', 'Priority support', '3 revisions', 'Source files'], days: Math.max(1, l.delivery_days-1), revisions: 3 },
    { label:'Premium',  price: Math.round(l.price*3.2),note: 'Full-service experience',    feats:['Everything in Standard', 'Unlimited revisions', 'Fastest delivery', '30-day support'], days: Math.max(1, l.delivery_days-2), revisions: 99 },
  ];
}

/* ── Load listing from Supabase ── */
async function loadListing() {
  /* sync nav first — non-blocking */
  AuthGuard.syncNav({
    guestEls: ['nav-login', 'nav-signup'],
    authEls:  ['nav-avatar'],
    avatarEl: 'nav-avatar',
  }).then(user => {
    const av = document.getElementById('nav-avatar');
    if (av && user) {
      av.style.display = 'flex';
      av.onclick = () => {
        const role = user.user_metadata?.role || 'buyer';
        window.location.href = (role === 'seller' || role === 'both')
          ? 'dashboard-seller.html' : 'dashboard-buyer.html';
      };
    }
  });

  const id = parseInt(new URLSearchParams(window.location.search).get('id'));
  if (!id) { showError('No listing ID found.'); return; }

  const { data, error } = await Listings.getById(id);

  if (error || !data) {
    showError('Listing not found or no longer available.');
    return;
  }

  listing = data;
  renderAll();
  loadRelated();
  loadReviews();
  loadSellerProfile();
  /* track view — non-blocking */
  Listings.trackView(data.id);
}

function showError(msg) {
  $('listing-meta').innerHTML = `<div style="color:var(--muted);padding:2rem 0;text-align:center">${msg}<br><a href="browse.html" style="color:var(--amber)">← Back to Browse</a></div>`;
}

/* ── Render everything ── */
function renderAll() {
  const l = listing;
  document.title = `Tradex — ${l.title}`;

  /* breadcrumb */
  $('bc-cat').textContent   = Listings.getCatName(l.category);
  $('bc-title').textContent = l.title.slice(0,35) + (l.title.length>35?'…':'');

  /* gallery */
  const imgs = l.images && l.images.length ? l.images : [Listings.getImage(l)];
  $('gallery-main').innerHTML = `
    <img src="${imgs[0]}" alt="${l.title}" id="main-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
    <div class="img-placeholder" style="display:none">${Listings.getCatEmoji(l.category)}</div>`;

  if (imgs.length > 1) {
    const nav = document.createElement('div');
    nav.className = 'gallery-nav';
    nav.innerHTML = imgs.map((src, i) => `
      <div class="g-thumb ${i===0?'active':''}" onclick="selectImg(this,'${src}')">
        <img src="${src}" alt="" onerror="this.parentElement.innerHTML='${Listings.getCatEmoji(l.category)}'" />
      </div>`).join('');
    $('gallery').appendChild(nav);
  }

  /* meta */
  const badge = Listings.getBadgeLabel(l.badge);
  $('listing-meta').innerHTML = `
    <div class="meta-top">
      <span class="cat-pill">${Listings.getCatEmoji(l.category)} ${Listings.getCatName(l.category)}</span>
      ${badge ? `<span class="l-badge ${Listings.getBadgeClass(l.badge)}">${badge}</span>` : ''}
    </div>
    <h1 class="listing-title">${l.title}</h1>
    <div class="listing-stats">
      <div class="stat-item">
        <span class="rating-stars">${Listings.getStars(l.rating)}</span>
        <span class="stat-val">${l.rating}</span>
        <span class="stat-label">(${l.review_count} reviews)</span>
      </div>
      <div class="stat-item"><span class="stat-icon">🛒</span><span class="stat-val">${(l.order_count||0).toLocaleString()}</span><span class="stat-label">orders</span></div>
      ${l.seller_location ? `<div class="stat-item"><span class="stat-icon">🌍</span><span class="stat-val">${l.seller_location}</span></div>` : ''}
    </div>`;

  /* seller mini */
  $('seller-mini').style.opacity = '1';
  $('seller-mini').innerHTML = `
    <div class="sm-av">${l.seller_name ? l.seller_name[0].toUpperCase() : '?'}</div>
    <div class="sm-info">
      <div class="sm-name">${l.seller_name || 'Unknown Seller'}</div>
      <div class="sm-tag">${Listings.getCatName(l.category)} Seller${l.seller_location ? ' · '+l.seller_location : ''}</div>
    </div>
    ${l.seller_verified ? '<span class="sm-badge">✅ Verified</span>' : ''}`;

  /* description */
  $('l-desc').innerHTML = l.description
    ? l.description.split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('')
    : '<p>No description provided.</p>';

  /* tags */
  if (l.tags && l.tags.length) {
    $('l-tags').innerHTML = l.tags.map(t =>
      `<span class="tag-pill" onclick="window.location.href='browse.html?q=${t}'">#${t}</span>`
    ).join('');
  }

  /* packages */
  $('pkg-box').style.opacity = '1';
  renderPkg();

  /* reviews + seller loaded async via loadReviews() and loadSellerProfile() */

  /* ── Dynamic SEO / OG tags ── */
  document.title = `${l.title} — Tradex`;
  const _setMeta = (id, val) => { const el=document.getElementById(id); if(el) el.setAttribute('content', val); };
  const _desc = (l.description||'').replace(/<[^>]+>/g,'').slice(0,160);
  const _img  = l.images?.[0] || '';
  _setMeta('og-title',  `${l.title} — Tradex`);
  _setMeta('og-desc',   _desc);
  _setMeta('og-img',    _img);
  _setMeta('og-url',    window.location.href);
  _setMeta('og-price',  String(l.price));
  _setMeta('tw-title',  `${l.title} — Tradex`);
  _setMeta('tw-desc',   _desc);
  _setMeta('tw-img',    _img);
  const _can = document.getElementById('canonical');
  if(_can) _can.setAttribute('href', window.location.href);
}

/* ── Package render ── */
function renderPkg() {
  if (!listing) return;
  const pkgs = getPackages(listing);
  const p = pkgs[selPkgIdx];
  const revStr = p.revisions >= 99 ? 'Unlimited revisions' : `${p.revisions} revision${p.revisions>1?'s':''}`;

  /* update tab labels */
  document.querySelectorAll('[data-pkg]').forEach((t,i) => { t.textContent = pkgs[i]?.label || t.textContent; });
  document.querySelectorAll('[data-pkg-d]').forEach((t,i) => { t.textContent = pkgs[i]?.label || t.textContent; });

  /* mobile */
  $('pkg-price').textContent = `$${p.price}`;
  $('pkg-note').textContent  = p.note;
  $('pkg-feats').innerHTML   = p.feats.map(f=>`<div class="pkg-feat"><span class="pf-check">✓</span>${f}</div>`).join('');
  $('pkg-days').textContent  = `${p.days} day${p.days!==1?'s':''} delivery`;
  $('pkg-revs').textContent  = ` · ${revStr}`;
  $('bar-amount').textContent= `$${p.price}`;

  /* desktop */
  $('pkg-price-d').textContent = `$${p.price}`;
  $('pkg-note-d').textContent  = p.note;
  $('pkg-feats-d').innerHTML   = p.feats.map(f=>`<div class="pkg-feat"><span class="pf-check">✓</span>${f}</div>`).join('');
  $('pkg-days-d').textContent  = `${p.days} day${p.days!==1?'s':''} delivery`;
  $('pkg-revs-d').textContent  = ` · ${revStr}`;
}

/* pkg tab clicks */
document.querySelectorAll('[data-pkg], [data-pkg-d]').forEach(btn =>
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.pkg ?? btn.dataset.pkgD);
    selPkgIdx = idx;
    /* sync all pkg tabs */
    document.querySelectorAll('[data-pkg]').forEach((t,i)  => t.classList.toggle('active', i===idx));
    document.querySelectorAll('[data-pkg-d]').forEach((t,i) => t.classList.toggle('active', i===idx));
    renderPkg();
  })
);

/* ── Reviews — real from Supabase ── */
async function loadReviews() {
  const l = listing;

  /* Always show summary bar from listing's aggregate data */
  if (l.review_count > 0) {
    $('rv-summary').style.display = 'flex';
    $('rv-val').textContent   = l.rating;
    $('rv-stars').textContent = Listings.getStars(l.rating);
    $('rv-total').textContent = `${l.review_count} review${l.review_count !== 1 ? 's' : ''}`;

    /* Fetch real distribution from reviews table */
    const { data: reviews } = await Listings.getListingReviews(l.id);

    if (reviews && reviews.length > 0) {
      /* Build real distribution */
      const dist = { 5:0, 4:0, 3:0, 2:0, 1:0 };
      reviews.forEach(r => { if (dist[r.rating] !== undefined) dist[r.rating]++; });
      const total = reviews.length;

      $('rv-bars').innerHTML = [5,4,3,2,1].map(s => {
        const pct = total > 0 ? Math.round((dist[s]/total)*100) : 0;
        return `<div class="rbar"><span class="rbar-lbl">${s}★</span><div class="rbar-track"><div class="rbar-fill" style="width:${pct}%"></div></div><span class="rbar-cnt">${dist[s]}</span></div>`;
      }).join('');

      /* Render real review cards */
      $('rv-list').innerHTML = reviews.map(r => {
        const name   = r.users?.full_name || 'Buyer';
        const initl  = name[0].toUpperCase();
        const stars  = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const date   = new Date(r.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        return `
          <div class="rv-card">
            <div class="rv-head">
              <div class="rv-user">
                <div class="rv-av">${initl}</div>
                <div>
                  <div class="rv-name">${name}</div>
                  <div class="rv-date">${date}</div>
                </div>
              </div>
              <div class="rv-rating" style="color:var(--amber);font-size:0.82rem">${stars}</div>
            </div>
            <div class="rv-text">${r.comment || ''}</div>
          </div>`;
      }).join('');

    } else {
      /* Aggregate data exists but no individual reviews yet — estimate bars */
      const dist = { 5: Math.round(l.review_count*0.72), 4: Math.round(l.review_count*0.16), 3: Math.round(l.review_count*0.07), 2: Math.round(l.review_count*0.03), 1: Math.round(l.review_count*0.02) };
      $('rv-bars').innerHTML = [5,4,3,2,1].map(s => {
        const pct = Math.round((dist[s]/l.review_count)*100);
        return `<div class="rbar"><span class="rbar-lbl">${s}★</span><div class="rbar-track"><div class="rbar-fill" style="width:${pct}%"></div></div><span class="rbar-cnt">${dist[s]}</span></div>`;
      }).join('');
      $('rv-list').innerHTML = `<div class="no-reviews">Reviews will appear here as buyers leave feedback.</div>`;
    }

  } else {
    $('rv-summary').style.display = 'none';
    $('rv-list').innerHTML = `<div class="no-reviews">No reviews yet — be the first to buy and review this listing!</div>`;
  }
}

/* ── Seller profile — real from Supabase ── */
async function loadSellerProfile() {
  const l = listing;
  const sf = $('seller-full');

  /* Show loading skeleton */
  sf.innerHTML = `
    <div class="sf-head">
      <div class="sf-av" style="background:var(--bg3)">${(l.seller_name||'?')[0].toUpperCase()}</div>
      <div style="flex:1"><div class="skeleton" style="height:14px;width:120px;margin-bottom:6px;border-radius:6px"></div><div class="skeleton" style="height:11px;width:180px;border-radius:6px"></div></div>
    </div>`;

  /* Try to load real seller profile */
  const { data: seller } = await Listings.getSellerProfile(l.seller_id);

  /* Also load seller's other listings */
  const { data: otherListings } = l.seller_id
    ? await Listings.getSellerListings(l.seller_id, l.id, 3)
    : { data: [] };

  const name     = seller?.full_name || l.seller_name || 'Unknown Seller';
  const location = seller?.location  || l.seller_location || '';
  const bio      = seller?.bio       || `Seller on Tradex${location ? ' based in ' + location : ''}.`;
  const verified = seller?.verified  || l.seller_verified;
  const orders   = seller?.totalOrders   ?? l.order_count   ?? 0;
  const rating   = seller?.avgRating     ?? l.rating        ?? '—';
  const reviews  = seller?.totalReviews  ?? l.review_count  ?? 0;
  const since    = seller?.memberSince   || new Date(l.created_at).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  const listings = seller?.totalListings ?? 1;

  sf.innerHTML = `
    <div class="sf-head">
      <div class="sf-av">${name[0].toUpperCase()}</div>
      <div>
        <div class="sf-name">${name} ${verified ? '<span style="color:var(--success);font-size:0.78rem">✅ Verified</span>' : ''}</div>
        <div class="sf-sub">${Listings.getCatName(l.category)} Seller${location ? ' · ' + location : ''}</div>
      </div>
    </div>
    <div class="sf-stats">
      <div class="sf-stat"><div class="ss-val">${Number(orders).toLocaleString()}</div><div class="ss-lbl">Orders</div></div>
      <div class="sf-stat"><div class="ss-val">${rating}</div><div class="ss-lbl">Rating</div></div>
      <div class="sf-stat"><div class="ss-val">${Number(reviews).toLocaleString()}</div><div class="ss-lbl">Reviews</div></div>
      <div class="sf-stat"><div class="ss-val">${listings}</div><div class="ss-lbl">Listings</div></div>
      <div class="sf-stat"><div class="ss-val">${since}</div><div class="ss-lbl">Member since</div></div>
    </div>
    <div class="sf-bio">${bio}</div>
    ${l.tags?.length ? `<div class="sf-pills">${l.tags.map(t=>`<span class="sf-pill">${t}</span>`).join('')}</div>` : ''}
    ${otherListings?.length ? `
      <div style="margin-top:1.25rem;padding-top:1.1rem;border-top:1px solid var(--border)">
        <div style="font-size:0.82rem;font-weight:600;margin-bottom:0.85rem;color:var(--muted)">More from ${name.split(' ')[0]}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem">
          ${otherListings.map(ol => {
            const img = Listings.getImage(ol, 0);
            return `
              <a href="listing.html?id=${ol.id}" style="text-decoration:none;display:block;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all 0.2s" onmouseover="this.style.borderColor='rgba(245,158,11,0.2)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.07)'">
                <div style="height:70px;overflow:hidden;background:var(--bg4)">
                  <img src="${img}" alt="${ol.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'" />
                </div>
                <div style="padding:0.55rem">
                  <div style="font-size:0.75rem;font-weight:600;color:var(--text);margin-bottom:0.2rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3">${ol.title}</div>
                  <div style="font-family:var(--serif);font-size:0.85rem;font-weight:700;color:var(--amber)">$${ol.price}</div>
                </div>
              </a>`;
          }).join('')}
        </div>
      </div>` : ''}`;
}

/* ── Related listings ── */
async function loadRelated() {
  const { data } = await Listings.getRelated(listing.category, listing.id, 4);
  if (!data || data.length === 0) { $('related-grid').innerHTML = ''; $('related-grid').parentElement.style.display='none'; return; }
  $('related-grid').innerHTML = data.map(r => {
    const img = Listings.getImage(r, 0);
    return `
      <a class="mini-card" href="listing.html?id=${r.id}">
        <div class="mini-img">
          <img src="${img}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <div class="mini-img-ph" style="display:none">${Listings.getCatEmoji(r.category)}</div>
        </div>
        <div class="mini-body">
          <div class="mini-title">${r.title}</div>
          <div class="mini-foot">
            <div class="mini-rating"><span>★</span>${r.rating} (${r.review_count})</div>
            <div class="mini-price">$${r.price}</div>
          </div>
        </div>
      </a>`;
  }).join('');
}

/* ── Gallery image select ── */
function selectImg(el, src) {
  document.querySelectorAll('.g-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const main = $('main-img');
  if (main) { main.src = src; main.style.display = 'block'; }
}

/* ── Tabs ── */
document.querySelector('.tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab'); if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  $(`panel-${tab.dataset.tab}`).classList.add('active');
});

/* ── Buy ── */
async function doBuy(btn) {
  if (!listing) return;
  const pkg = getPackages(listing)[selPkgIdx];
  /* save checkout data first — survives login redirect */
  sessionStorage.setItem('tradex_checkout', JSON.stringify({
    listing_id:    listing.id,
    listing_title: listing.title,
    listing_image: listing.images?.[0] || '',
    seller_id:     listing.seller_id   || null,
    seller_name:   listing.seller_name || 'Seller',
    category:      listing.category,
    package_label: pkg.label,
    package_note:  pkg.note,
    price:         pkg.price,
    delivery_days: pkg.days,
  }));
  await AuthGuard.protectAction(() => {
    window.location.href = 'checkout.html';
  }, { label: 'complete your purchase' });
}
$('buy-btn').addEventListener('click',   () => doBuy($('buy-btn')));
$('buy-btn-d').addEventListener('click', () => doBuy($('buy-btn-d')));

/* ── Save ── */
async function doSave() {
  await AuthGuard.protectAction(async () => {
    isSaved = !isSaved;
    const btns = [$('save-btn'), $('save-btn-d')];
    btns.forEach(b => {
      if (!b) return;
      b.innerHTML = isSaved ? '❤️ Saved' : '🤍 Save';
      b.classList.toggle('saved', isSaved);
    });
    if (isSaved) await Listings.save(listing.id);
    else         await Listings.unsave(listing.id);
  }, { label: 'save this listing' });
}
$('save-btn').addEventListener('click',   doSave);
$('save-btn-d').addEventListener('click', doSave);

/* ── Share ── */
function doShare() {
  if (navigator.share) navigator.share({ title: listing?.title, url: window.location.href });
  else { navigator.clipboard.writeText(window.location.href); showAlert('a-info','Link copied!','info'); }
}
$('share-btn-d').addEventListener('click', doShare);

/* ── Contact ── */
function doContact() {
  AuthGuard.protectAction(() => {
    showAlert('a-info','Messaging is available inside your dashboard after purchase.','info');
  }, { label: 'message this seller' });
}
$('contact-btn').addEventListener('click',   doContact);
$('contact-btn-d').addEventListener('click', doContact);

/* ── Alerts ── */
function showAlert(id, msg, type='err') {
  ['a-err','a-ok','a-info'].forEach(i => $(i).classList.remove('on'));
  const el = $(id); el.className = `alert ${type} on`;
  if (msg) { const sp = el.querySelectorAll('span')[1]; if(sp) sp.textContent = msg; }
}
function clearAlerts() { ['a-err','a-ok','a-info'].forEach(i => $(i).classList.remove('on')); }

/* ── Init ── */
loadListing();
</script>
</body>
</html>
